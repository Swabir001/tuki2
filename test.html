<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TukiStudy (moved)</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #0f0d0a;
        --grey: #7a746c;
        --orange: #f58a00;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial,
          sans-serif;
        color: var(--ink);
        background: #fff;
      }
      .wrap {
        max-width: 760px;
        margin: 0 auto;
        padding: 64px 20px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 28px;
      }
      p {
        margin: 0 0 14px;
        color: var(--grey);
        line-height: 1.6;
      }
      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas,
          "Liberation Mono", "Courier New", monospace;
        font-size: 0.95em;
      }
      .card {
        border: 1px solid #eee;
        border-radius: 14px;
        padding: 18px;
        background: #faf8f5;
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <h1>This file is no longer the app</h1>
      <p>
        The React/JSX code that used to be in <code>test.html</code> was moved
        into the runnable Vite app at <code>src/App.jsx</code>.
      </p>
      <div class="card">
        <p style="margin-bottom: 8px; color: var(--ink)">Run the app:</p>
        <p style="margin-bottom: 0">
          <code>npm install</code> · <code>npm run dev</code>
        </p>
      </div>
      <p style="margin-top: 18px">
        Main entry is <code>index.html</code> (Vite), not this file.
      </p>
      <p>If you don’t need this placeholder, delete <code>test.html</code>.</p>
    </main>
  </body>
</html>
